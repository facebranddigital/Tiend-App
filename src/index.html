<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bracasfood</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <meta name="theme-color" content="#ff6b00" />
    <!-- Barra naranja en el cel -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
    <!-- Icono para iPhone -->

    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="preload" as="image" href="assets/hero.webp" />
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- El logo que sale en la pantalla naranja -->
    <link rel="preload" as="image" href="assets/bracasfoodlogo.jpeg" />
  </head>
  <body>
    <app-root>
      <div
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background-color: #ff6b00; /* Naranja Bracasfood */
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        "
      >
        <!-- Tu Logo -->
        <img
          src="assets/bracasfoodlogo.jpeg"
          style="
            width: 120px;
            height: 120px;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            animation: pulse 1.5s infinite ease-in-out;
          "
          alt="Cargando Bracasfood..."
        />

        <!-- Spinner -->
        <div
          style="
            margin-top: 30px;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s linear infinite;
          "
        ></div>

        <p style="color: white; margin-top: 20px; font-weight: 500; letter-spacing: 1px">
          Cocinando tu pedido...
        </p>
      </div>

      <!-- ESTILOS DE LAS ANIMACIONES -->
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
        @keyframes pulse {
          0% {
            transform: scale(1);
          }
          50% {
            transform: scale(1.1);
          }
          100% {
            transform: scale(1);
          }
        }
      </style>
    </app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
