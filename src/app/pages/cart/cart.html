<div class="cart-container">
  <h2>Tu Carrito</h2>

  <!-- ESTADO VACÍO: Con tu animación 3D flotante del logo -->
  <div *ngIf="cartService.cartItems().length === 0" class="empty-cart">
    <img src="assets/bracasfoodlogo.jpeg" alt="Carrito Vacío" class="vibe-img" />
    <p style="margin-bottom: 20px; font-size: 1.1rem; color: #555; font-weight: 500">
      Tu carrito está vacío. ¡Agrega deliciosas Bracas!
    </p>
    <button class="btn-primary">Ver Menú</button>
  </div>

  <!-- CONTENIDO CON PRODUCTOS -->
  <div *ngIf="cartService.cartItems().length > 0" class="cart-content">
    <!-- Lista de Productos -->
    <div class="cart-items">
      <div *ngFor="let item of cartService.cartItems()" class="cart-item">
        <img [src]="item.imagen || 'assets/bracasfoodlogo.jpeg'" [alt]="item.nombre" />

        <div class="item-info">
          <h3>{{ item.nombre || item.name }}</h3>
          <p class="price">
            {{ item.cantidad || item.quantity }}x ${{ item.precio || item.price }}
          </p>
        </div>

        <button (click)="eliminarItem(item.id)" class="delete-btn">🗑️</button>
      </div>
    </div>

    <!-- Tarjeta de Resumen -->
    <div class="cart-summary">
      <div class="totals">
        <div class="total-row">
          <span>Productos</span>
          <span>{{ cartService.cartItems().length }}</span>
        </div>
        <div class="total-row main-total">
          <span>Total a pagar:</span>
          <span>${{ cartService.totalPagar() }}</span>
        </div>
      </div>

      <button (click)="enviarPedido()" class="btn-checkout">Confirmar Pedido</button>
    </div>
  </div>
</div>

<!-- BOTÓN FLOTANTE WHATSAPP: El botón hermoso de la esquina -->
<a
  *ngIf="cartService.cartItems().length > 0"
  (click)="enviarPedido()"
  class="bracas-wa-float"
  style="cursor: pointer"
>
  <div class="wa-message-bubble">
    <span>¿Listo para comer?</span>
    <strong>Pedir por WhatsApp</strong>
  </div>

  <div class="wa-icon-circle">
    <img src="https://wikimedia.org" alt="WhatsApp" class="wa-img-fix" />
  </div>
</a>
