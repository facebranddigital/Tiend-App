<main class="products-container">
  <header class="products-header">
    <!-- SECCIÓN DE TÍTULO Y LOGO -->
    <div class="header-content">
      <div class="title-with-logo">
        <h1>Inventario</h1>
        <img src="assets/bracasfoodlogo.jpeg" alt="Logo" class="mini-logo" />
      </div>
      <p>Control Total Bracasfood</p>
    </div>

    <!-- BUSCADOR -->
    <div class="search-container">
      <div class="search-wrapper">
        <svg
          class="search-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          #searchInput
          type="text"
          placeholder="Busca un producto..."
          class="search-input"
          (input)="onSearch(searchInput.value)"
        />
      </div>
    </div>

    <!-- BOTÓN ESTILO NAVBAR -->
    <button class="btn-add" [routerLink]="['/products/new']">
      <span class="icon">+</span>
      <span class="text">Nuevo Producto</span>
    </button>
  </header>

  <!-- TABLA DE PRODUCTOS -->
  <div class="table-card">
    <div class="table-responsive">
      <ng-container *ngIf="products$ | async as products; else loading">
        <table class="products-table">
          <thead>
            <tr>
              <th>Imagen</th>
              <th>Producto</th>
              <th>Descripción</th>
              <th>Valor</th>
              <th class="text-center">Stock</th>
              <th>Status</th>
              <th class="text-right">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let product of products; trackBy: trackByFn">
              <td>
                <div class="image-wrapper">
                  <img
                    [src]="product.imageUrl || 'assets/placeholder-product.png'"
                    [alt]="product.name"
                  />
                </div>
              </td>
              <td>
                <strong>{{ product.name }}</strong>
              </td>
              <td>
                <p class="truncate">{{ product.description }}</p>
              </td>
              <td>{{ product.price | currency: 'USD' : 'symbol' : '1.0-0' }}</td>
              <td class="text-center">{{ product.stock }} <small>und</small></td>
              <td>
                <span class="status-badge" [ngClass]="getStatusClass(product.status)">
                  {{ product.status }}
                </span>
              </td>
              <td class="text-right">
                <div class="actions-wrapper">
                  <button class="btn-icon edit" [routerLink]="['/products/edit', product.id]">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                  </button>
                  <button class="btn-icon delete" (click)="onDelete(product.id!)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"></polyline>
                      <path
                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                      ></path>
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
        <div *ngIf="products.length === 0" class="empty-state">No hay productos.</div>
      </ng-container>

      <ng-template #loading>
        <div class="loading-container"><p>Sincronizando inventario...</p></div>
      </ng-template>
    </div>
  </div>
</main>
<button [routerLink]="['/admin/finanzas']" class="btn-finance">📊 Calcular Ganancias</button>
