<div id="top" class="landing-container">
  <div class="landing-container">
    <!-- HERO SECTION -->
    <section class="hero">
      <img src="assets/bracasfoodlogo.jpeg" alt="Bracas Food Logo" class="hero-img" />
      <div class="hero-overlay"></div>
      <!-- Envolvemos todo en un contenedor flexible -->
      <div class="hero-wrapper">
        <div class="hero-logo-space">
          <!-- Dejamos este espacio vacío para que el logo respire -->
        </div>

        <div class="hero-content">
          <div class="cta-buttons">
            <button class="btn-primary" (click)="scrollTo('bolis-leche')">Bolis Leche</button>
            <button class="btn-secondary" (click)="scrollTo('papitas')">Papitas BF</button>
            <button class="btn-secondary" (click)="scrollTo('tocineta')">Tocineta BF</button>
            <button class="btn-primary" (click)="scrollTo('platanos')">Platanos BF</button>
            <button class="btn-primary" (click)="scrollTo('bolis-natural')">Bolis Natural</button>
          </div>
        </div>
      </div>
    </section>
    <!-- Aquí se cierra el Hero correctamente -->

    <div class="promo-banner">
      <h2>¡Consiente tu paladar!<i class="fas fa-apple-alt"></i></h2>
    </div>

    <section class="featured-products">
      <div class="product-grid">
        <!-- Producto 1: Platanos -->
        <div class="product-card" id="platanos" #pasabocasCard>
          <div class="product-image">
            <img src="assets/bracasfood2.webp" alt="Platanos BF" loading="lazy" />
          </div>
          <div class="product-info">
            <div class="text-group">
              <h3>Platanos BF</h3>
              <span class="price">$2.500</span>
            </div>
            <div class="purchase-row">
              <div class="qty-mini">
                <button
                  (click)="pQty1.value = (+pQty1.value > 1 ? +pQty1.value - 1 : 1).toString()"
                >
                  -
                </button>
                <input #pQty1 type="number" value="1" readonly />
                <button (click)="pQty1.value = (+pQty1.value + 1).toString()">+</button>
              </div>
              <button
                class="add-btn"
                (click)="
                  onAddToCart('Platanos BF', 2500, 'Snacks', 'assets/bracasfood2.webp', pQty1.value)
                "
              >
                COMPRAR
              </button>
            </div>
          </div>
        </div>

                  -

                <button (click)="pQty2.value = (+pQty2.value + 1).toString()">+</button>
              </div>
              <button

                    'Bolis de Leche',
                    2000,
                    'Pasabocas',
                    'assets/bracasfoodbolis.webp',
                    pQty2.value
                  )
                "

                COMPRAR

            </div>
          </div>
        </div>

              </div>
              <button

                  onAddToCart(
                    'Bolis Naturales',
                    1500,
                    'Postres',
                    'assets/bolismorados.webp',
                    pQty3.value
                  )
                "
              >
                COMPRAR
              </button>
            </div>
          </div>
        </div>

        <!-- Producto 4: Papitas BF -->
        <div class="product-card" id="papitas" #papitasCard>
          <div class="product-image">

          </div>
          <div class="product-info">
            <div class="text-group">

                <button (click)="pQty4.value = (+pQty4.value + 1).toString()">+</button>
              </div>
              <button

                (click)="
                  onAddToCart('Papitas BF', 2500, 'Snacks', 'assets/papasbf.webp', pQty4.value)
                "
              >

            </div>
          </div>
        </div>

        <!-- Producto 5: Tocineta BF -->
        <div class="product-card" id="tocineta" #tocinetaCard>
          <div class="product-image">
            <img src="assets/tocinetabf.webp" alt="Tocineta BF" loading="lazy" />
          </div>
          <div class="product-info">
            <div class="text-group">
              <h3>Tocineta BF</h3>
              <span class="price">$2.500</span>
            </div>
            <div class="purchase-row">
              <div class="qty-mini">
                <button
                  (click)="pQty5.value = (+pQty5.value > 1 ? +pQty5.value - 1 : 1).toString()"
                >

                <input #pQty5 type="number" value="1" readonly />
                <button (click)="pQty5.value = (+pQty5.value + 1).toString()">+</button>
              </div>
              <button
                class="add-btn"
                (click)="
                  onAddToCart('Tocineta BF', 2500, 'Snacks', 'assets/tocinetabf.webp', pQty5.value)
                "

                COMPRAR

            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- BANNER FINAL -->
    <section class="promo-banner secondary">
      <div class="promo-content">
        <h2>¡Consiente tu paladar!</h2>
        <button class="btn-main" (click)="hacerPedidoWhatsApp()">
          HAZ TU PEDIDO AQUÍ <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </section>
  </div>
</div>
<button class="bracas-float-btn" (click)="scrollToTop()">
  <img src="assets/bracasfoodlogo.jpeg" alt="Logo" class="bracas-float-img" />
  <span class="bracas-float-badge" *ngIf="cartService.count() > 0">
    {{ cartService.count() }}
  </span>
</button>

  <!-- ASISTENTE VIRTUAL BRACASBOT -->
<div class="chat-wrapper">
  <!-- Ventana del Chat -->
  <div class="chat-window" *ngIf="isOpen()">
    <div class="chat-header">
      <div class="header-info" style="display: flex; align-items: center; gap: 8px;">
        <img src="assets/robot-asistente.png" alt="Bot" style="width: 30px; height: 30px; border-radius: 50%; background: white; padding: 2px;">
        <p>BracasBot</p>
      </div>
      <button class="close-btn" (click)="toggleChat()">×</button>
    </div>

    <div class="chat-body">
      <div *ngFor="let msg of messages()" 
           [ngClass]="{'user-msg': msg.role === 'user', 'bot-msg': msg.role === 'model'}">
        <div class="message-bubble">{{ msg.text }}</div>
      </div>
      
      <!-- Indicador de carga -->
      <div class="bot-msg" *ngIf="isLoading()">
        <div class="message-bubble typing"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- 👇 AQUÍ AGREGAMOS EL BOTÓN DE CONFIRMACIÓN FINAL 👇 -->
    <div *ngIf="step() === 3" style="padding: 10px; background: #f9f9f9; border-top: 1px solid #eee;">
      <button (click)="confirmarPedidoFinal()" 
              style="width: 100%; background: #25D366; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 8px;">
        CONFIRMAR PEDIDO EN WHATSAPP 🛵
      </button>
    </div>

    <div class="chat-footer">
      <input 
        type="text" 
        [(ngModel)]="userInput" 
        (keyup.enter)="sendMessage()" 
        placeholder="¿Buscas bolis o pasabocas?"
        [disabled]="isLoading()"
      />
      <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading() || !userInput.trim()">
        ➤
      </button>
    </div>
  </div>

  <!-- Botón Flotante con Imagen del Robot Nuevo -->
  <div class="action-buttons">
    <button class="float-btn ai" (click)="toggleChat()" [ngClass]="{'active': isOpen()}">
      <span *ngIf="isOpen()" style="font-size: 2rem; font-weight: 900; color: white;">×</span>
      <img *ngIf="!isOpen()" src="assets/robot-asistente.png" alt="Robot" class="bot-icon-img" />
    </button>
  </div>
</div>
