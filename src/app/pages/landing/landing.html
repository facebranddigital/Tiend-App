<div class="landing-container">
  
  <!-- HERO -->
  <section class="hero">
    
    <!-- ✅ Imagen optimizada para LCP -->
    <img 
      src="assets/hero.webp"
      alt="Hero banner"
      class="hero-img"
      fetchpriority="high"
      loading="eager"
    />

    <!-- overlay -->
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="cta-buttons">
               <button class="btn-primary" (click)="toggleModal()">Ver Colección</button>
        <button class="btn-secondary">Saber Más</button>
      </div>
    </div>
  </section>

  <!-- BANNER -->
  <div class="promo-banner">
    <h2>
      Me vale Verga
      <i class="fas fa-hospital-symbol"></i>
    </h2>
  </div>

  <!-- PRODUCTOS -->
  <section class="featured-products">
    <div class="section-header">
      <a href="#">PUTO EL QUE LO LEA →</a>
    </div>

    <div class="product-grid">

      <!-- PRODUCTO 1 -->
      <div class="product-card">
        <div class="product-image">
          <img 
            src="assets/headphones.webp" 
            alt="Nexus Headphones"
            loading="lazy"
          >
        </div>
        <div class="product-info">
          <span class="category">Premium Audio</span>
          <h3>Nexus Wireless Headphones</h3>
          <div class="price-row">
            <span class="price">$299.00</span>
            <button class="add-btn"
              (click)="onAddToCart('Nexus Wireless Headphones', 299.00, 'Premium Audio', 'assets/headphones.webp')">
              +
            </button>
          </div>
        </div>
      </div>

      <!-- PRODUCTO 2 -->
      <div class="product-card">
        <div class="product-image">
          <img 
            src="assets/smartwatch.webp" 
            alt="Z-Series Smartwatch"
            loading="lazy"
          >
          <span class="badge">New</span>
        </div>
        <div class="product-info">
          <span class="category">Wearables</span>
          <h3>Z-Series Smartwatch</h3>
          <div class="price-row">
            <span class="price">$350.00</span>
            <button class="add-btn"
              (click)="onAddToCart('Z-Series Smartwatch', 350.00, 'Wearables', 'assets/smartwatch.webp')">
              +
            </button>
          </div>
        </div>
      </div>

      <!-- PRODUCTO 3 -->
      <div class="product-card">
        <div class="product-image">
          <img 
            src="assets/airbud.webp" 
            alt="Quantum Wireless Buds"
            loading="lazy"
          >
          <span class="badge">-20%</span>
        </div>
        <div class="product-info">
          <span class="category">Audio Tech</span>
          <h3>Quantum Wireless Buds</h3>
          <div class="price-row">
            <span class="price">$150.00</span>
            <button class="add-btn"
              (click)="onAddToCart('Quantum Wireless Buds', 150.00, 'Audio Tech', 'assets/airbud.webp')">
              +
            </button>
          </div>
        </div>
      </div>

    </div>
  </section>

</div>
