<main class="auth-container">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Crea tu cuenta</h1>
      <p>Únete a nuestra plataforma y gestiona tus productos fácilmente.</p>
    </header>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label for="name">Nombre Completo</label>
        <input 
          type="text" 
          id="name" 
          name="name"
          data-testid="reg-name"
          formControlName="name" 
          placeholder="Tu nombre"
          [class.invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
        <span class="error-msg" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          El nombre es requerido
        </span>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          data-testid="reg-email"
          formControlName="email" 
          placeholder="tu@ejemplo.com" 
          [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        <span class="error-msg" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Email requerido o inválido
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          data-testid="reg-password"
          formControlName="password" 
          placeholder="Mínimo 6 caracteres" 
          [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        <span class="error-msg" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          La contraseña debe tener al menos 6 caracteres
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          data-testid="reg-confirm-password"
          formControlName="confirmPassword"
          placeholder="Repite tu contraseña"
          [class.invalid]="(registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched) || (registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched)">
        <span class="error-msg" *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
          Confirma tu contraseña
        </span>
        <span class="error-msg" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
          Las contraseñas no coinciden
        </span>
      </div>

      <button type="submit" 
      class="btn-submit">
      Registrar
      </button>

      <div class="auth-links">
        <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
      </div>
    </form>
  </div>
</main>
