<main class="auth-container">
  <div class="auth-card">
    <!-- Bloque 1: Formulario de Registro Tradicional (Oculto tras crear cuenta exitosamente) -->
    <ng-container *ngIf="!stepFacial">
      <header class="auth-header">
        <h1>Crea tu cuenta</h1>
        <p>Únete a nuestra plataforma y gestiona tus productos fácilmente.</p>
      </header>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" formControlName="name" placeholder="Tu nombre" />
        </div>

        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" formControlName="email" placeholder="tu@ejemplo.com" />
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Mínimo 6 caracteres"
            />
            <button type="button" class="toggle-eye" (click)="togglePasswordVisibility()">
              <svg
                *ngIf="!showPassword"
                viewBox="0 0 24 24"
                width="22"
                height="22"
                fill="currentColor"
              >
                <path
                  d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                />
              </svg>
              <svg
                *ngIf="showPassword"
                viewBox="0 0 24 24"
                width="22"
                height="22"
                fill="currentColor"
              >
                <path
                  d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              formControlName="confirmPassword"
              placeholder="Repite tu contraseña"
            />
            <button type="button" class="toggle-eye" (click)="toggleConfirmPasswordVisibility()">
              <svg
                *ngIf="!showConfirmPassword"
                viewBox="0 0 24 24"
                width="22"
                height="22"
                fill="currentColor"
              >
                <path
                  d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                />
              </svg>
              <svg
                *ngIf="showConfirmPassword"
                viewBox="0 0 24 24"
                width="22"
                height="22"
                fill="currentColor"
              >
                <path
                  d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- Alerta de errores de Firebase -->
        <div class="error-alert" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Cargando...' : 'Registrarse' }}
        </button>

        <p class="login-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
      </form>
    </ng-container>

    <!-- Bloque 2: Registro Biométrico Facial (Paso Obligatorio post-creación de cuenta) -->
    <div *ngIf="stepFacial" class="facial-auth-wrapper">
      <header class="auth-header">
        <h1>Enrolamiento Facial</h1>
        <p>Captura tu rostro inicial para activar la llave biométrica de seguridad.</p>
      </header>

      <!-- Vista de cámara web y canvas oculto para congelar cuadro -->
      <video #video autoplay playsinline></video>
      <canvas #canvas style="display: none"></canvas>

      <!-- Alerta de errores de la API de DeepFace -->
      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Botón de guardado definitivo con estilos heredados -->
      <button
        type="button"
        class="btn-submit"
        (click)="guardarRostroOriginal()"
        [disabled]="loading"
      >
        {{ loading ? 'Registrando características...' : 'Guardar mi Rostro' }}
      </button>
    </div>
  </div>
</main>
