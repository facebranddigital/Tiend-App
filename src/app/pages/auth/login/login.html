<main class="auth-container">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Bienvenido de nuevo</h1>
      <p>Ingresa tus credenciales para gestionar tu inventario.</p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          data-testid="login-email"
          formControlName="email" 
          placeholder="tu@ejemplo.com" 
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <span class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Por favor, ingresa un correo válido.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          data-testid="login-password"
          formControlName="password" 
          placeholder="Tu contraseña" 
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <span class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña es obligatoria.
        </span>
      </div>

     <button type="submit" 
     class="w-full bg-black text-white font-bold py-3 px-4 rounded-lg shadow-md hover:bg-gray-800 transition-all duration-300 uppercase tracking-wide mt-6">
     Iniciar Sesión
    </button>

      <div class="auth-links">
        <p>¿No tienes una cuenta aún? <a routerLink="/register">Regístrate gratis</a></p>
      </div>
    </form>
  </div>
</main>
