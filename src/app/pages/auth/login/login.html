<app-navbar></app-navbar>

<main class="auth-container">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Bienvenido de nuevo</h1>
      <p>Ingresa tus credenciales para gestionar tus productos.</p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="tu@ejemplo.com" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <span class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">Ingresa un correo válido.</span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••" [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <span class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">Mínimo 6 caracteres.</span>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>

      <p class="auth-footer">
        ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
      </p>
    </form>
  </div>
</main>

<app-footer></app-footer>
