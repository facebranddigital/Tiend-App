<main class="auth-container">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Bienvenido de nuevo</h1>
      <p>Ingresa tus credenciales para gestionar tu inventario.</p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          data-testid="login-email"
          formControlName="email" 
          placeholder="tu@ejemplo.com" 
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <span class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Por favor, ingresa un correo válido.
        </span>
      </div>

     <div class="form-group">
  <label for="password">Contraseña</label>
  <div class="password-wrapper"> <!-- Este div es la clave -->
    <input 
      [type]="showPassword ? 'text' : 'password'" 
      id="password" 
      formControlName="password" 
      placeholder="Tu contraseña" 
      [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
    
    <!-- El botón del ojo (Sin clases de cuadro, solo la nuestra) -->
    <button type="button" class="toggle-eye" (click)="togglePasswordVisibility()">
      <!-- Icono Ojo Abierto -->
      <svg *ngIf="!showPassword" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
      </svg>
      <!-- Icono Ojo Cerrado -->
      <svg *ngIf="showPassword" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
      </svg>
    </button>
  </div>
</div>

<!-- MENSAJE DE ERROR: Ponlo aquí, justo antes del botón naranja -->
<div class="error-alert" *ngIf="errorMessage">
  {{ errorMessage }}
</div>

<button type="submit" class="btn-submit" [disabled]="loading">
  {{ loading ? 'Cargando...' : 'Iniciar sesión' }}
</button>

      <div class="auth-links">
        <p>¿No tienes una cuenta aún? <a routerLink="/register">Regístrate gratis</a></p>
      </div>
    </form>
  </div>
</main>
