<main class="auth-container">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Restablecer contraseña</h1>
      <p>Establece una nueva contraseña para acceder a tu cuenta.</p>
    </header>

    <form class="auth-form">
      <div class="form-group">
        <label for="password">Nueva contraseña</label>
        <input type="password" id="password" placeholder="Nueva contraseña" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" />
      </div>

      <button type="button" class="btn-submit">Guardar contraseña</button>
    </form>
  </div>
</main>
