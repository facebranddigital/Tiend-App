<!-- 1. El contenedor del Navbar añade los estilos oscuros morados solo en esa vista -->
<nav class="navbar" [class.admin-nav-theme]="isCalculadoraAdminActive$ | async">
  
  <a
    class="logo"
    [routerLink]="logoLink$ | async"
    style="text-decoration: none !important; cursor: pointer"
  >
    <!-- 2. El texto C&E Schneider aparece únicamente en esa pantalla -->
    <span *ngIf="isCalculadoraAdminActive$ | async; else bracasLogo" class="logo-admin-text">
      C&E Schneider
    </span>

    <!-- 3. En todo el resto de la aplicación (Inicio, Productos, etc.) se mantiene Bracasfood -->
    <ng-template #bracasLogo>
      <span
        style="
          display: inline-block;
          background: linear-gradient(95deg, #ff6b00, #ffb800);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
          font-weight: 1000;
        "
        >Bracasfood</span
      >
    </ng-template>
  </a>
  <!-- LINKS DE NAVEGACIÓN -->
  <ul class="nav-links">
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Inicio
      </a>
    </li>

    <!-- SALESFORCE ADMIN: Acceso exclusivo para dueños -->
    <li *ngIf="isAdmin$ | async">
      <a routerLink="/products" routerLinkActive="active">Inventario Admin</a>
    </li>

    <li><a routerLink="/categorias">Categorías</a></li>
    <li><a routerLink="/ofertas">Ofertas</a></li>
  </ul>

  <!-- ACCIONES (Buscador, Carrito, Auth, Perfil) -->
  <div class="nav-actions">
    <!-- BUSCADOR EXPANDIBLE -->
    <div class="search-container" [class.active]="isSearchActive">
      <input
        type="text"
        placeholder="Buscar producto..."
        class="search-input"
        #searchInput
        (keyup.enter)="onSearch(searchInput.value)"
      />
      <button class="search-btn-custom" (click)="toggleSearch()" aria-label="Abrir buscador">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>

    <!-- CARRITO: Reactividad con Signals -->
    <button class="cart-btn-custom" routerLink="/cart" aria-label="Carrito">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      <span class="cart-badge-custom" *ngIf="cartService.count() > 0">
        {{ cartService.count() }}
      </span>
    </button>

    <!-- ACCIONES DE AUTENTICACIÓN Y PERFIL -->
    <ng-container *ngIf="authService.user$ | async as user; else loginBtn">
      <a routerLink="/perfil" class="profile-nav-btn" title="Mi Perfil">
        <img
          *ngIf="user.photoURL; else defaultIcon"
          [src]="user.photoURL"
          alt="Foto Perfil"
          class="nav-avatar"
        />
        <ng-template #defaultIcon>
          <div class="nav-avatar-fallback">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
        </ng-template>
      </a>

      <!-- BOTÓN CERRAR SESIÓN -->
      <button class="logout-btn-styled" (click)="onLogout()" title="Cerrar Sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </ng-container>

    <ng-template #loginBtn>
      <button class="login-btn" routerLink="/login">Entrar</button>
    </ng-template>
  </div>
</nav>
