<div class="tracking-container">
  <!-- 1. ENCABEZADO -->
  <div class="header">
    <h2>Pedido #{{ pedidoId }}</h2>
    <p class="eta">
      Llega en: <span>{{ tiempoEstimado }} min</span>
    </p>
  </div>

  <!-- 2. LÍNEA DE TIEMPO (CORREGIDA: Comparaciones basadas en strings) -->
  <div class="timeline">
    <div class="progress-bar" [style.width.%]="obtenerPorcentajeProgreso()"></div>

    <div class="step" [class.active]="estadoActual === 'received' || estadoActual === 'preparing' || estadoActual === 'on_the_way' || estadoActual === 'delivered'">
      <div class="icon-circle">
        <i class="fas fa-box"></i>
      </div>
      <span>Recibido</span>
    </div>

    <div class="step" [class.active]="estadoActual === 'preparing' || estadoActual === 'on_the_way' || estadoActual === 'delivered'">
      <div class="icon-circle">
        <i class="fas fa-utensils"></i>
      </div>
      <span>Cocina</span>
    </div>

    <div class="step" [class.active]="estadoActual === 'on_the_way' || estadoActual === 'delivered'">
      <div class="icon-circle">
        <i class="fas fa-motorcycle"></i>
      </div>
      <span>En camino</span>
    </div>

    <div class="step" [class.active]="estadoActual === 'delivered'">
      <div class="icon-circle">
        <i class="fas fa-check-double"></i>
      </div>
      <span>Entregado</span>
    </div>
  </div>

  <!-- EL MAPA EN VIVO (CORREGIDO: Control de visibilidad limpio usando string) -->
  <div class="map-wrapper" [class.map-visible]="estadoActual === 'on_the_way'" [class.map-hidden]="estadoActual !== 'on_the_way'">
    <div id="map-container"></div>
    <div class="map-overlay">El repartidor va de camino a tu casa</div>
  </div>

  <!-- 3. TARJETA DEL REPARTIDOR -->
  <div class="delivery-card">
    <div class="driver-info">
      <img src="assets/repartidor.jpg" alt="Repartidor" class="avatar" />
      <div>
        <h4>Beatriz Castro</h4>
        <p>Repartidor designado</p>
      </div>
    </div>

    <!-- Extra: Corregido el enlace de WhatsApp que estaba mal estructurado -->
    <a
      href="https://wa.me¡Hola!%20Estoy%20esperando%20mi%20pedido%20de%20Bracasfood%20🍕🔥"
      target="_blank"
      class="btn-chat"
    >
      <i class="fab fa-whatsapp" style="margin-right: 5px"></i> CHAT
    </a>
  </div>

  <!-- ALERTAS GPS -->
  @if (errorGps) {
    <div class="gps-alert">
      <i class="fas fa-exclamation-triangle"></i> {{ errorGps }}
    </div>
  }
</div>
