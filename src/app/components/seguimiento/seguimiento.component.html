<div class="tracking-container">
  <!-- 1. EL ENCABEZADO (Vinculado a tu TypeScript) -->
  <div class="header">
    <h2>Pedido #{{ pedidoId }}</h2>
    <p class="eta">
      Llega en: <span>{{ tiempoEstimado }} min</span>
    </p>
  </div>

  <!-- 2. LÍNEA DE TIEMPO "LOCO LUCAS" -->
  <div class="timeline">
    <!-- Barra naranja de progreso interno dinámica -->
    <div class="progress-bar" [style.width.%]="obtenerPorcentajeProgreso()"></div>

    <!-- PASO 1: RECIBIDO (status: received) -->
    <div class="step" [class.active]="estadoActual >= 1">
      <div class="icon-circle">
        <i class="fas fa-box"></i>
      </div>
      <span>Recibido</span>
    </div>

    <!-- PASO 2: COCINA (status: preparing) -->
    <div class="step" [class.active]="estadoActual >= 2">
      <div class="icon-circle">
        <i class="fas fa-utensils"></i>
      </div>
      <span>Cocina</span>
    </div>

    <!-- PASO 3: EN CAMINO (status: on_the_way) -->
    <div class="step" [class.active]="estadoActual >= 3">
      <div class="icon-circle">
        <i class="fas fa-motorcycle"></i>
      </div>
      <span>En camino</span>
    </div>

    <!-- PASO 4: ENTREGADO (status: delivered) -->
    <div class="step" [class.active]="estadoActual >= 4">
      <div class="icon-circle">
        <i class="fas fa-check-double"></i>
      </div>
      <span>Entregado</span>
    </div>
  </div>

  <!-- NUEVO: EL MAPA EN VIVO ESTILO YANGO (Se enciende cuando el estado es 'En Camino') -->
  @if (estadoActual === 3) {
    <div class="map-wrapper">
      <div id="map-container"></div>
      <div class="map-overlay">El repartidor va de camino a tu casa</div>
    </div>
  }

  <!-- 3. TARJETA DEL REPARTIDOR -->
  <div class="delivery-card">
    <div class="driver-info">
      <img src="assets/driver-avatar.png" alt="Repartidor" class="avatar" />
      <div>
        <h4>Carlos Mendoza</h4>
        <p>Tu repartidor asignado</p>
      </div>
    </div>

    <!-- ✅ BOTÓN DE CHAT TOTALMENTE OPERATIVO CON TU NÚMERO REAL -->
    <a
      href="https://wa.me/573218119383?text=¡Hola!%20Estoy%20esperando%20mi%20pedido%20de%20Bracasfood%20🍕🔥"
      target="_blank"
      class="btn-chat"
    >
      <i class="fab fa-whatsapp" style="margin-right: 5px"></i> CHAT
    </a>
  </div>

  <!-- SECCIÓN AUXILIAR: ALERTA DE ERROR GPS -->
  @if (errorGps) {
    <div
      style="
        margin-top: 15px;
        color: #ff6b00;
        font-size: 0.8rem;
        font-weight: bold;
        text-align: center;
      "
    >
      <i class="fas fa-exclamation-triangle"></i> {{ errorGps }}
    </div>
  }
</div>
