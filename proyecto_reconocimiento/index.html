<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autenticación Facial Multiusuario</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #1e1e24;
        color: white;
        padding: 20px;
      }
      .contenedor {
        max-width: 500px;
        margin: auto;
        background: #2a2a35;
        padding: 20px;
        border-radius: 10px;
      }
      video {
        background: #000;
        border-radius: 8px;
        margin-bottom: 15px;
        width: 100%;
        max-width: 400px;
      }
      canvas {
        display: none;
      }
      .input-grupo {
        margin-bottom: 15px;
      }
      input {
        padding: 10px;
        width: 80%;
        border-radius: 5px;
        border: none;
        font-size: 16px;
        text-align: center;
      }
      .btn-grupo {
        display: flex;
        justify-content: space-around;
        gap: 10px;
        margin-bottom: 15px;
      }
      button {
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }
      #btn-registrar {
        background-color: #007bff;
        color: white;
      }
      #btn-verificar {
        background-color: #28a745;
        color: white;
      }
      #resultado {
        font-size: 16px;
        font-weight: bold;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h2>Reconocimiento Facial Firebase</h2>

      <div class="input-grupo">
        <input
          type="text"
          id="usuario-id"
          placeholder="Escribe el ID o Correo del Usuario"
          required
        />
      </div>

      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>

      <div class="btn-grupo">
        <button id="btn-registrar">Registrar Rostro</button>
        <button id="btn-verificar">Verificar Identidad</button>
      </div>

      <div id="resultado">Configurando cámara...</div>
    </div>

    <script>
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const btnRegistrar = document.getElementById('btn-registrar');
      const btnVerificar = document.getElementById('btn-verificar');
      const resultadoDiv = document.getElementById('resultado');
      const usuarioIdInput = document.getElementById('usuario-id');

      navigator.mediaDevices
        .getUserMedia({ video: { width: 400, height: 300 } })
        .then((stream) => {
          video.srcObject = stream;
          resultadoDiv.innerText = 'Cámara lista.';
        })
        .catch((err) => {
          resultadoDiv.innerText = 'Error de cámara.';
          console.error(err);
        });

      function enviarFormulario(endpoint, mensajeExito) {
        const userId = usuarioIdInput.value.trim();
        if (!userId) {
          resultadoDiv.innerText = 'Error: Debes ingresar un ID de usuario.';
          resultadoDiv.style.color = 'red';
          return;
        }

        resultadoDiv.innerText = 'Procesando biometría...';
        resultadoDiv.style.color = 'orange';

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(
          (blob) => {
            if (!blob) return;

            const formData = new FormData();
            formData.append('file', blob, 'captura.jpg');
            formData.append('usuario_id', userId);

            fetch(endpoint, { method: 'POST', body: formData })
              .then((res) => {
                if (!res.ok)
                  return res.json().then((err) => {
                    throw new Error(err.detail);
                  });
                return res.json();
              })
              .then((data) => {
                resultadoDiv.innerText = mensajeExito;
                resultadoDiv.style.color = 'lightgreen';
              })
              .catch((err) => {
                resultadoDiv.innerText = `Error: ${err.message}`;
                resultadoDiv.style.color = 'red';
              });
          },
          'image/jpeg',
          0.95,
        );
      }

      btnRegistrar.addEventListener('click', () =>
        enviarFormulario('/api/user/register-face', '¡Rostro guardado en Firebase!'),
      );
      btnVerificar.addEventListener('click', () =>
        enviarFormulario('/api/user/verify-face', '¡Acceso Concedido por Firebase! 😊'),
      );
    </script>
  </body>
</html>
