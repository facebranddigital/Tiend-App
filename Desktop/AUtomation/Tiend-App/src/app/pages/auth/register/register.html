<app-navbar></app-navbar>

<main class="auth-container">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Crea tu cuenta</h1>
      <p>Únete a nuestra plataforma y gestiona tus productos fácilmente.</p>
    </header>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="tu@ejemplo.com" [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
        <span class="error-msg" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">Ingresa un correo válido.</span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="Mínimo 6 caracteres" [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        <span class="error-msg" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">Es obligatoria y debe tener al menos 6 caracteres.</span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="Repite tu contraseña" [class.error]="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
        <span class="error-msg" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">Las contraseñas no coinciden.</span>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Creando cuenta...' : 'Crear Cuenta' }}
      </button>

      <p class="auth-footer">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </p>
    </form>
  </div>
</main>

<app-footer></app-footer>
