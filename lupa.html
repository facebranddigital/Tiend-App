<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Efecto Lupa Pro - QA Testing</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; }
        h2 { color: #333; }

        /* Contenedor de la imagen */
        .img-magnifier-container {
            position: relative;
            cursor: none; /* Ocultamos el mouse normal sobre la imagen */
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        #myimage { border-radius: 8px; display: block; }

        /* La Lupa */
        .img-magnifier-glass {
            position: absolute;
            border: 3px solid #0070f3;
            border-radius: 50%;
            cursor: none;
            /* Tamaño de la lupa */
            width: 150px;
            height: 150px;
            /* Suavizado de bordes */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            pointer-events: none; /* Para que el mouse no choque con la lupa misma */
        }
    </style>
</head>
<body>

    <h2>🔍 Lupa Interactiva (Tiend-App Preview)</h2>
    <p>Pasa el cursor sobre la imagen para ver el zoom</p>

    <div class="img-magnifier-container">
        <img id="myimage" src="https://picsum.photos/800/500" width="800" height="500">
    </div>

    <script>
        function magnify(imgID, zoom) {
            var img, glass, w, h, bw;
            img = document.getElementById(imgID);
            /* Crear la lupa dinámicamente */
            glass = document.createElement("DIV");
            glass.setAttribute("class", "img-magnifier-glass");
            /* Insertar la lupa antes de la imagen */
            img.parentElement.insertBefore(glass, img);
            /* Configurar el fondo de la lupa */
            glass.style.backgroundImage = "url('" + img.src + "')";
            glass.style.backgroundRepeat = "no-repeat";
            glass.style.backgroundSize = (img.width * zoom) + "px " + (img.height * zoom) + "px";
            bw = 3;
            w = glass.offsetWidth / 2;
            h = glass.offsetHeight / 2;

            /* Escuchar movimientos del mouse */
            glass.addEventListener("mousemove", moveMagnifier);
            img.addEventListener("mousemove", moveMagnifier);

            function moveMagnifier(e) {
                var pos, x, y;
                e.preventDefault();
                /* Obtener coordenadas del cursor */
                pos = getCursorPos(e);
                x = pos.x;
                y = pos.y;
                /* Evitar que la lupa se salga de la imagen */
                if (x > img.width - (w / zoom)) {x = img.width - (w / zoom);}
                if (x < w / zoom) {x = w / zoom;}
                if (y > img.height - (h / zoom)) {y = img.height - (h / zoom);}
                if (y < h / zoom) {y = h / zoom;}
                /* Posicionar la lupa */
                glass.style.left = (x - w) + "px";
                glass.style.top = (y - h) + "px";
                /* Mostrar el zoom en el fondo de la lupa */
                glass.style.backgroundPosition = "-" + ((x * zoom) - w + bw) + "px -" + ((y * zoom) - h + bw) + "px";
            }

            function getCursorPos(e) {
                var a, x = 0, y = 0;
                e = e || window.event;
                a = img.getBoundingClientRect();
                x = e.pageX - a.left;
                y = e.pageY - a.top;
                x = x - window.pageXOffset;
                y = y - window.pageYOffset;
                return {x : x, y : y};
            }
        }

        /* INICIAR: magnify("ID_IMAGEN", NIVEL_ZOOM) */
        magnify("myimage", 3);
    </script>

</body>
</html>
